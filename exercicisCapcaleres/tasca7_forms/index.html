<!DOCTYPE html>
<head>
    <title>Inscripció</title>
</head>
<body>
    <h1>Formulari d'inscripció voluntariat</h1>
    <form action="">
        <label for="nom">Nom: </label>
        <input type="text" name="nom" id="nom" placeholder="Introdueix el teu nom" required> 
        
        <label for="correu">Correu electrònic: </label>
        <input type="text" name="correu" id="correu" placeholder="johndoe@email.service" required>

        <label for="ciutat">Ciutat</label>
        <input type="text" name="ciutat" id="ciutat" placeholder="Mongat" required>

        <p>Tens experiència en voluntariats?:</p>
        <form>
        <input type="radio" id="si" name="experiencia" value="si">
        <label for="si">Si</label><br>
        <input type="radio" id="no" name="experiencia" value="no">
        <label for="no">No</label><br>
        </form>

        <p>Activitats que vols cobrir:</p>
        <form>
        <input type="checkbox" id="recollir" name="activitats" value="recollir">
        <label for="recollir">Recollir pilotes</label><br>
        <input type="checkbox" id="transport" name="activitats" value="transport">
        <label for="transport">Transportar equipament</label><br>
        <input type="checkbox" id="dirigir" name="activitats" value="dirigir">
        <label for="dirigir">Dirigir activitats</label><br> 
        </form>
        
        <br><label for="coments">Comentaris: </label>
        <br><textarea name="coments" id="coments" cols="40" rows="4"></textarea>

        <button>Enviar</button>
    </form>
</body>
</html>
